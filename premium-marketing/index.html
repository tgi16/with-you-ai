
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Photographer Marketing Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Padauk', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .burmese-text {
            font-family: 'Padauk', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
      (async function bootstrapPremiumMarketing() {
        const originalFetch = window.fetch.bind(window);
        window.fetch = async (input, init) => {
          const rawUrl = typeof input === 'string' ? input : (input && input.url) ? input.url : '';
          if (rawUrl.includes('generativelanguage.googleapis.com/')) {
            try {
              const parsed = new URL(rawUrl);
              parsed.searchParams.delete('key');
              const target = parsed.pathname + (parsed.search ? parsed.search : '');
              const proxyUrl = '/api/gemini-proxy?target=' + encodeURIComponent(target);

              const proxyInit = { ...(init || {}) };
              if (!proxyInit.method && typeof input !== 'string' && input && input.method) {
                proxyInit.method = input.method;
              }
              if (!proxyInit.body && typeof input !== 'string' && input && input.body) {
                proxyInit.body = input.body;
              }
              return originalFetch(proxyUrl, proxyInit);
            } catch (_) {}
          }
          return originalFetch(input, init);
        };

        const s = document.createElement('script');
        s.type = 'module';
        s.crossOrigin = 'anonymous';
        s.src = '/premium-marketing/assets/index-Ci1wSa1F.js';
        document.body.appendChild(s);
      })();
    </script>
</body>
</html>
